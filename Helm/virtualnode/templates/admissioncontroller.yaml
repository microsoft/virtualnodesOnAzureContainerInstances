apiVersion: apps/v1
kind: Deployment
metadata:
  name: "virtual-node-admission-controller"
  namespace: {{ include "virtualnode2.namespace" . }}
spec:
  replicas: {{ .Values.admissionControllerReplicaCount }}
  selector:
    matchLabels:
      {{- include "virtualnode2.admissionSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "virtualnode2.admissionSelectorLabels" . | nindent 8 }}
      annotations:
        "kubernetes.azure.com/no-http-proxy-vars": "true"
    spec:
      {{- with .Values.images.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.admissionControllerPriorityClassName }}
      priorityClassName: {{ .Values.admissionControllerPriorityClassName }}
      {{- end }} 
      terminationGracePeriodSeconds: 0
      serviceAccountName: {{ if .Values.rbac.install }} "{{ .Values.rbac.serviceAccountName }}" {{ end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "virtualnode2.admissionSelectorLabels" . | nindent 14 }}
      containers:
        - name: admissioncontroller
          image: {{ .Values.images.admissioncontrollerImage }}
          env:
            - name: SECRET_NAME
              value: virtual-node-admission-controller
            - name: SECRET_NAMESPACE
              value: {{ include "virtualnode2.namespace" . }}
            - name: ADMISSION_CONTROLLER_NAME
              value: virtual-node-admission-controller
            - name: SERVICE_DNS_NAME
              value: "virtual-node-admission-controller.{{ include "virtualnode2.namespace" . }}.svc"
            - name: INFRA_POD_MIN_RESTART_DELAY_SECONDS
              value: {{ quote .Values.infraPodMinRestartDelaySeconds }}
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1G
          startupProbe:
            httpGet:
              path: /healthz
              port: 19865
              scheme: HTTPS
            failureThreshold: 36
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 19865
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 19865
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: {{ .Values.images.pullPolicy }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}      
